server:
  port: 8081

spring:
  application:
    name: 2-product-service

  datasource:
    url: jdbc:mysql://localhost:3306/microservices_project_db?createDatabaseIfNotExist=true
    username: root
    password: 1234

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

management:
  endpoints:
    web:
      exposure:
        include: "*"

logging:
  level:
    com.yourpackage: DEBUG